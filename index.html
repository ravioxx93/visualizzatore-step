<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEP Viewer Prototipo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: sans-serif;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(30, 30, 30, 0.85);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            color: #fff;
            z-index: 10;
            max-width: 320px;
            border: 1px solid #333;
        }
        h3 { margin-top: 0; color: #00e5ff; }
        .btn-carica {
            display: inline-block;
            background: #00e5ff;
            color: #1a1a1a;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            width: 100%;
            box-sizing: border-box;
            transition: background 0.2s;
        }
        .btn-carica:hover { background: #00b3cc; }
        #file-input { display: none; }
        #status { font-size: 13px; color: #aaa; margin-top: 5px; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/occt-import-js@0.0.12/dist/occt-import-js.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-container">
        <h3>STEP Viewer Prototipo</h3>
        <p style="font-size: 13px; color: #ccc;">Seleziona un file .step o .stp dal PC o dal telefono.</p>
        <label for="file-input" class="btn-carica">Seleziona File STEP</label>
        <input type="file" id="file-input" accept=".step,.stp">
        <div id="status">Stato: Pronto. In attesa di un file...</div>
    </div>

    <script>
        // --- CONFIGURAZIONE SCENA THREE.JS ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(50, 50, 50);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Controlli mouse e touch (Usa OrbitControls globale della libreria r128)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Luci
        const ambientLight = new THREE.AmbientLight(0x666666);
        scene.add(ambientLight);

        const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight1.position.set(1, 1, 1).normalize();
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0x555555, 0.5);
        dirLight2.position.set(-1, -1, -1).normalize();
        scene.add(dirLight2);

        // Gestione ridimensionamento finestra
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Loop di rendering Animazione
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // --- GESTIONE CARICAMENTO ED ELABORAZIONE FILE ---
        let currentMeshGroup = null;
        const fileInput = document.getElementById('file-input');
        const statusDiv = document.getElementById('status');

        fileInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            statusDiv.innerText = "Stato: Lettura file in corso...";

            const reader = new FileReader();
            reader.onload = function(e) {
                const arrayBuffer = e.target.result;
                const fileBuffer = new Uint8Array(arrayBuffer);

                statusDiv.innerText = "Stato: Conversione STEP (Attendi)...";

                // Avviamo il modulo WebAssembly di Open CASCADE
                occtimportjs().then(async (occt) => {
                    // Passiamo il Uint8Array direttamente come vuole la libreria
                    const result = occt.ReadStepFile(fileBuffer);

                    if (result.success) {
                        statusDiv.innerText = "Stato: Rendering 3D...";
                        creaGeometria3D(result);
                        statusDiv.innerText = Stato: File caricato con successo (${file.name});
                    } else {
                        statusDiv.innerText = "Stato: Errore nella conversione del file STEP.";
                    }
                }).catch(err => {
                    console.error(err);
                    statusDiv.innerText = "Stato: Errore nell'avvio del motore geometrico.";
                });
            };
            reader.readAsArrayBuffer(file);
        });

        // --- FUNZIONE PER DISEGNARE IL COSTRUTTO 3D ---
        function creaGeometria3D(result) {
            // Se c'era già un pezzo caricato precedente, lo cancelliamo dalla scena
            if (currentMeshGroup) scene.add(currentMeshGroup);
            if (currentMeshGroup) {
                scene.remove(currentMeshGroup);
            }

            currentMeshGroup = new THREE.Group();

            // Materiale standard grigio metallizzato per la carpenteria
            const material = new THREE.MeshStandardMaterial({
                color: 0x90caf9,
                roughness: 0.4,
                metalness: 0.8,
                side: THREE.DoubleSide
            });

            // Ciclo sui blocchi geometrici convertiti dal file STEP
            for (let i = 0; i < result.meshes.length; i++) {
                const meshData = result.meshes[i];
                
                const geometry = new THREE.BufferGeometry();
                
                // Posizioni dei vertici
                geometry.setAttribute('position', new THREE.Float32BufferAttribute(meshData.attributes.position.array, 3));
                
                // Normali per i riflessi della luce
                if (meshData.attributes.normal) {
                    geometry.setAttribute('normal', new THREE.Float32BufferAttribute(meshData.attributes.normal.array, 3));
                } else {
                    geometry.computeVertexNormals();
                }

                // Indici delle facce (i triangoli del 3D)
                if (meshData.index) {
                    geometry.setIndex(new THREE.BufferAttribute(new Uint16Array(meshData.index.array), 1));
                }

                const mesh = new THREE.Mesh(geometry, material);
                currentMeshGroup.add(mesh);
            }

            scene.add(currentMeshGroup);

            // Centriamo e regoliamo lo zoom della telecamera sul pezzo reale caricato
            const box = new THREE.Box3().setFromObject(currentMeshGroup);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());

            controls.target.copy(center);
            
            const maxDim = Math.max(size.x, size.y, size.z);
            camera.position.set(center.x + maxDim, center.y + maxDim, center.z + maxDim);
            camera.lookAt(center);
            
            controls.update();
        }
    </script>
</body>
</html>
