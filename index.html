<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototipo Visualizzatore STEP 3D</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(30, 30, 30, 0.85);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border: 1px solid #333;
            max-width: 320px;
        }

        h3 { margin-top: 0; color: #00adb5; font-weight: 600; }
        
        .btn-input {
            background: #00adb5;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            display: inline-block;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
        }
        .btn-input:hover { background: #008c9e; }

        #file-input { display: none; }

        .status-box {
            margin-top: 15px;
            font-size: 13px;
            color: #aaa;
            line-height: 1.4;
        }

        #loading-hub {
            display: none;
            color: #ffde7d;
            font-weight: bold;
            margin-top: 10px;
        }

        #control-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(30, 30, 30, 0.9);
            padding: 15px 30px;
            border-radius: 30px;
            display: none;
            border: 1px solid #444;
            align-items: center;
            gap: 15px;
        }
        
        .slider-label { font-size: 14px; font-weight: bold; }
        .slider { width: 200px; accent-color: #00adb5; }
    </style>

    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/occt-import-js@0.0.12/dist/occt-import-js.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-overlay">
        <h3>STEP Viewer Prototipo</h3>
        <p style="font-size: 13px; color: #ccc;">Trascina un file .step nella pagina oppure usa il pulsante sotto.</p>
        
        <label for="file-input" class="btn-input">Seleziona File STEP</label>
        <input type="file" id="file-input" accept=".step,.stp">

        <div class="status-box">
            <div id="status">Stato: Pronto. In attesa di un file...</div>
            <div id="loading-hub">Elaborazione geometria in corso...</div>
        </div>
    </div>

    <div id="control-panel">
        <span class="slider-label">Esploso Assieme:</span>
        <input type="range" id="explode-slider" class="slider" min="0" max="100" value="0">
    </div>

    <script>
        // --- CONFIGURAZIONE SCENA 3D (THREE.JS) ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(100, 100, 100);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // OrbitControls gestisce sia mouse (PC) che touch/gesti (Mobile)
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Illuminazione della scena
        const ambientLight = new THREE.AmbientLight(0x666666);
        scene.add(ambientLight);

        const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight1.position.set(1, 1, 1).normalize();
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0x555555, 0.5);
        dirLight2.position.set(-1, -1, -1).normalize();
        scene.add(dirLight2);

        let currentModelGroup = null;
        let originalPositions = [];

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- GESTIONE DEI FILE ---
        const fileInput = document.getElementById('file-input');
        const statusDiv = document.getElementById('status');
        const loadingHub = document.getElementById('loading-hub');
        const controlPanel = document.getElementById('control-panel');
        const explodeSlider = document.getElementById('explode-slider');

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        });

        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file && (file.name.endsWith('.step') || file.name.endsWith('.stp'))) {
                handleFile(file);
            }
        });

        function handleFile(file) {
            statusDiv.innerText = `Caricamento: ${file.name}`;
            loadingHub.style.display = 'block';
            explodeSlider.value = 0;
            controlPanel.style.display = 'none';

            const reader = new FileReader();
            reader.onload = function (e) {
                const arrayBuffer = e.target.result;
                const fileBuffer = new Uint8Array(arrayBuffer);

                occtimportjs().then(async (occt) => {
                    const result = occt.ReadStepFile(fileBuffer, null);
                    if (result.success) {
                        buildMeshFromStepResult(result);
                    } else {
                        statusDiv.innerText = "Errore nel parsing del file STEP.";
                        loadingHub.style.display = 'none';
                    }
                });
            };
            reader.readAsArrayBuffer(file);
        }

        // --- COSTRUZIONE DELLA GEOMETRIA 3D ---
        function buildMeshFromStepResult(result) {
            if (currentModelGroup) scene.remove(currentModelGroup);
            
            currentModelGroup = new THREE.Group();
            originalPositions = [];

            result.meshes.forEach((meshData) => {
                const geometry = new THREE.BufferGeometry();

                geometry.setAttribute('position', new THREE.Float32BufferAttribute(meshData.attributes.position.array, 3));
                if (meshData.attributes.normal) {
                    geometry.setAttribute('normal', new THREE.Float32BufferAttribute(meshData.attributes.normal.array, 3));
                }
                if (meshData.index) {
                    geometry.setIndex(new THREE.BufferAttribute(new Uint32Array(meshData.index.array), 1));
                }

                let color = 0xaaaaaa;
                if (meshData.color) {
                    color = new THREE.Color(meshData.color[0], meshData.color[1], meshData.color[2]);
                }

                const material = new THREE.MeshStandardMaterial({
                    color: color,
                    roughness: 0.4,
                    metalness: 0.2,
                    side: THREE.DoubleSide
                });

                const mesh = new THREE.Mesh(geometry, material);
                currentModelGroup.add(mesh);

                // Calcolo baricentro del singolo pezzo per l'esploso radiale
                geometry.computeBoundingBox();
                const center = new THREE.Vector3();
                geometry.boundingBox.getCenter(center);
                const direction = center.clone().normalize();

                originalPositions.push({
                    mesh: mesh,
                    basePos: mesh.position.clone(),
                    dir: direction
                });
            });

            scene.add(currentModelGroup);

            // Inquadratura automatica del pezzo basata sul suo ingombro reale
            const box = new THREE.Box3().setFromObject(currentModelGroup);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            
            controls.target.copy(center);
            
            const maxDim = Math.max(size.x, size.y, size.z);
            camera.position.set(center.x + maxDim * 1.5, center.y + maxDim * 1.5, center.z + maxDim * 1.5);
            camera.lookAt(center);
            controls.update();

            statusDiv.innerText = "Modello caricato con successo!";
            loadingHub.style.display = 'none';
            
            if(originalPositions.length > 1) {
                controlPanel.style.display = 'flex';
            }
        }

        // --- LOGICA SLIDER ESPLOSO ---
        explodeSlider.addEventListener('input', (e) => {
            const factor = e.target.value * 0.5;
            originalPositions.forEach(item => {
                item.mesh.position.copy(item.basePos).addScaledVector(item.dir, factor);
            });
        });
    </script>
</body>
</html>
